# Linker config for bank 1 C monitor (W65C02SXB)
#
# Output is a flat 32KB binary for flash bank 1 ($08000–$0FFFF file offset).
# CPU address range: $8000–$FFFF
#
# Layout:
#   ROMHDR   $8000–$8006  WDC\x00 signature + JMP entry (7 bytes)
#   ROM      $8007–$FFF9  C code + rodata
#   RESETVEC $FFFA–$FFFF  NMI/RESET/IRQ vectors (6 bytes)
#
# RAM layout (not in output binary):
#   ZP       $0000–$001F  cc65 zero-page variables (sp, ptr1, tmp1, …)
#   RAM      $0200–$7AFF  BSS + DATA run area (grows up from $0200)
#
# C software stack grows downward from __STACKSTART__ ($7B00) with
# __STACKSIZE__ ($0400 = 1 KB).  This leaves a safe margin below the
# peripheral I/O space which starts at $7F80.

SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0400;
    __STACKSTART__: type = weak, value = $7B00;
}

MEMORY {
    ZP:       start = $0000, size = $0020, type = rw, define = yes;
    RAM:      start = $0200, size = $7900, type = rw, define = yes, file = "";
    ROMHDR:   start = $8000, size = $0007, fill = yes, fillval = $FF, file = %O;
    ROM:      start = $8007, size = $7FF3, fill = yes, fillval = $FF, file = %O;
    RESETVEC: start = $FFFA, size = $0006, fill = yes, fillval = $FF, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    BSS:      load = RAM,      type = bss, define = yes;
    DATA:     load = ROM,      run = RAM, type = rw, define = yes;
    ROMHDR:   load = ROMHDR,   type = ro;
    STARTUP:  load = ROM,      type = ro;
    ONCE:     load = ROM,      type = ro, optional = yes;
    CODE:     load = ROM,      type = ro;
    RODATA:   load = ROM,      type = ro;
    RESETVEC: load = RESETVEC, type = ro;
}

FEATURES {
    CONDES: type  = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type  = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__,
            segment = RODATA;
}
