# Linker config for user programs run from RAM under the bank 1 C monitor
#
# Output is a flat binary loaded into RAM at $4000.
# Upload with:
#   python3 tools/upload.py <port> build/hello.bin --addr 4000 --run
#
# Memory layout:
#   $0000–$001F  cc65 zero page (saved/restored by crt0.s — shared with monitor)
#   $4000–$6CFF  User program: STARTUP + CODE + RODATA + DATA load area (~11.5 KB)
#   $6B00–$6CFF  (BSS also here, not in binary)
#   $6D00        C stack top  (grows down; monitor stack is $7700–$7AFF)
#
# The C stack (__STACKSTART__ = $6D00, __STACKSIZE__ = $0200) sits below the
# monitor's reserved stack range ($7700–$7B00), so both can coexist safely.

SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0200;
    __STACKSTART__: type = weak, value = $6D00;
}

MEMORY {
    ZP:  start = $0000, size = $0020, type = rw,              define = yes;
    RAM: start = $4000, size = $2D00, type = rw, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp;
    STARTUP:  load = RAM, type = ro;
    CODE:     load = RAM, type = ro;
    RODATA:   load = RAM, type = ro;
    DATA:     load = RAM, run = RAM,  type = rw,  define = yes;
    BSS:      load = RAM, type = bss, define = yes;
}

FEATURES {
    CONDES: type  = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = STARTUP;
    CONDES: type  = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__,
            segment = RODATA;
}
